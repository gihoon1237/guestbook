<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>л°©лӘ…лЎқ</title>
  <style>
    @font-face {
      font-family: 'OngleipParkDahyeon';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fffbe6;
      color: #5c3d1e;
      font-family: 'OngleipParkDahyeon', 'Malgun Gothic', sans-serif;
      font-size: 14px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 28px;
      font-weight: bold;
      font-family: 'OngleipParkDahyeon', sans-serif;
    }

    .title-cat { font-size: 18px; }

    h2 {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      font-family: 'OngleipParkDahyeon', sans-serif;
    }

    .open-write-btn {
      margin-bottom: 24px;
      padding: 8px 28px;
      background: #b07d3a;
      color: #fffbe6;
      border: none;
      font-size: 15px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      cursor: pointer;
      width: 100%;
      max-width: 700px;
    }
    .open-write-btn:hover { background: #8a5e25; }

    /* мһ‘м„ұ нҸј лһҳнҚј (к·Җ лӢ¬кё°мҡ©) */
    .write-wrapper {
      position: relative;
      padding-top: 18px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 700px;
      display: none;
    }
    .write-wrapper.open { display: block; }

    .write-wrapper::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 18px solid #b07d3a;
    }
    .write-wrapper::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 18px solid #b07d3a;
    }

    /* мһ‘м„ұ нҸј */
    .write-section {
      border: 1px solid #b07d3a;
      padding: 20px;
      width: 100%;
      background: #fff9d6;
    }

    .form-row { display: flex; align-items: center; margin-bottom: 10px; }
    .form-row label {
      width: 80px;
      flex-shrink: 0;
      font-family: 'OngleipParkDahyeon', sans-serif;
      color: #5c3d1e;
    }
    .form-row input,
    .form-row textarea {
      flex: 1;
      border: 1px solid #b07d3a;
      padding: 5px 8px;
      font-size: 14px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      background: #fffdf0;
      color: #5c3d1e;
    }
    .form-row textarea { height: 80px; resize: vertical; }
    .form-row input:focus,
    .form-row textarea:focus { outline: 2px solid #b07d3a; }
    .form-row input::placeholder,
    .form-row textarea::placeholder { color: #c4a882; }

    .form-btns { display: flex; gap: 8px; margin-top: 6px; }

    .submit-btn {
      padding: 6px 20px;
      background: #b07d3a;
      color: #fffbe6;
      border: none;
      font-size: 14px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      cursor: pointer;
    }
    .submit-btn:hover { background: #8a5e25; }

    .cancel-btn {
      padding: 6px 20px;
      background: #fffdf0;
      color: #5c3d1e;
      border: 1px solid #b07d3a;
      font-size: 14px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      cursor: pointer;
    }
    .cancel-btn:hover { background: #f0e0b0; }

    /* лӘ©лЎқ м„№м…ҳ */
    .list-section {
      width: 100%;
      max-width: 700px;
    }

    /* к·ёлҰ¬л“ң */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px 16px;
    }

    /* кі м–‘мқҙ к·Җ л°•мҠӨ лһҳнҚј */
    .post-wrapper {
      position: relative;
      padding-top: 18px; /* к·Җ лҶ’мқҙл§ҢнҒј м—¬л°ұ */
    }

    /* мҷјмӘҪ к·Җ */
    .post-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 18px solid #b07d3a;
    }

    /* мҳӨлҘёмӘҪ к·Җ */
    .post-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 18px solid #b07d3a;
    }

    /* к·Җ м•ҲмӘҪ мғү (мҷјмӘҪ) */
    .post-wrapper .ear-left {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 15px solid #fff9d6;
      z-index: 1;
    }

    /* к·Җ м•ҲмӘҪ мғү (мҳӨлҘёмӘҪ) */
    .post-wrapper .ear-right {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 15px solid #fff9d6;
      z-index: 1;
    }

    .post-item {
      border: 1px solid #b07d3a;
      padding: 12px 12px 12px 12px;
      background: #fff9d6;
      height: 100%;
    }

    .post-cat {
      font-size: 16px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .post-title {
      font-weight: bold;
      font-size: 14px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      color: #5c3d1e;
      display: block;
      margin-bottom: 4px;
    }

    .post-meta {
      font-size: 11px;
      color: #9a7040;
      margin-bottom: 6px;
      font-family: 'OngleipParkDahyeon', sans-serif;
    }

    .post-content {
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'OngleipParkDahyeon', sans-serif;
      color: #5c3d1e;
      margin-bottom: 8px;
    }

    .delete-area { display: flex; gap: 4px; margin-top: 8px; }

    .delete-area input {
      border: 1px solid #b07d3a;
      padding: 3px 6px;
      font-size: 12px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      width: 100%;
      flex: 1;
      background: #fffdf0;
      color: #5c3d1e;
      min-width: 0;
    }
    .delete-area input::placeholder { color: #c4a882; }
    .delete-area input:focus { outline: 2px solid #b07d3a; }

    .delete-btn {
      padding: 3px 10px;
      background: #fffdf0;
      color: #5c3d1e;
      border: 1px solid #b07d3a;
      font-size: 12px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    .delete-btn:hover { background: #b07d3a; color: #fffbe6; }

    .empty-msg { color: #9a7040; font-family: 'OngleipParkDahyeon', sans-serif; }

    .error-msg {
      color: #c0392b;
      font-size: 11px;
      margin-top: 3px;
      font-family: 'OngleipParkDahyeon', sans-serif;
    }

    #status-msg {
      margin-bottom: 10px;
      font-size: 13px;
      font-family: 'OngleipParkDahyeon', sans-serif;
      color: #9a7040;
    }

    @media (max-width: 600px) {
      .post-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="title-row">
    <span class="title-cat">аё…^вҖўп»ҢвҖў^аё…</span>
    <h1>л°©лӘ…лЎқ</h1>
    <span class="title-cat">аё…^вҖўп»ҢвҖў^аё…</span>
  </div>

  <button class="open-write-btn" onclick="toggleWrite()">вңҸпёҸ л°©лӘ…лЎқ мһ‘м„ұн•ҳкё°</button>

  <div class="write-wrapper" id="write-section">
    <div class="ear-left"></div>
    <div class="ear-right"></div>
    <section class="write-section">
      <h2>л°©лӘ…лЎқ мһ‘м„ұ</h2>
      <div class="form-row">
        <label for="inp-title">м ңлӘ©</label>
        <input type="text" id="inp-title" placeholder="м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”" />
      </div>
      <div class="form-row">
        <label for="inp-writer">мһ‘м„ұмһҗ</label>
        <input type="text" id="inp-writer" placeholder="мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”" />
      </div>
      <div class="form-row">
        <label for="inp-content">лӮҙмҡ©</label>
        <textarea id="inp-content" placeholder="лӮҙмҡ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”"></textarea>
      </div>
      <div class="form-row">
        <label for="inp-password">л№„л°ҖлІҲнҳё</label>
        <input type="password" id="inp-password" placeholder="мӮӯм ң мӢң мӮ¬мҡ©н•  л№„л°ҖлІҲнҳё" />
      </div>
      <div class="form-btns">
        <button class="submit-btn" onclick="submitPost()">мһ‘м„ұ мҷ„лЈҢ</button>
        <button class="cancel-btn" onclick="toggleWrite()">м·ЁмҶҢ</button>
      </div>
      <div id="write-error" class="error-msg"></div>
    </section>
  </div>

  <section class="list-section">
    <h2>м „мІҙ л°©лӘ…лЎқ</h2>
    <div id="status-msg"></div>
    <div class="post-grid" id="post-list"></div>
  </section>

  <script>
    const BASE_URL = 'http://3.37.183.37:8000/guestbook/';

    const CATS = [
      'аё…^вҖўп»ҢвҖў^аё…','аё…ЛҶвҖ§в©ҠвҖ§ЛҶаё…','Л“Л“аёҒвӮҚвёҚвёҢМЈК·МЈМ«вёҚМЈвёҢвӮҺаё„Л’Л’','(=ЛҶ пҪҘ ЛҶ=)',
      '(=рҹқҰ ајқ рҹқҰ=)','(аё…^пҪҘПүпҪҘ^ аё…)','(пҫүОҰПүОҰ)пҫү','(=вҶҖПүвҶҖ=)',
      '=пјҫв—Ҹ вӢҸ в—Ҹпјҫ=','(.=^гғ»гӮ§гғ»^=)','( ЛҶ Мів—қ В·М« в—ң МіЛҶ )','(пҫҗ бө•МЈМЈМЈМЈМЈМЈ п»Ң бө•МЈМЈМЈМЈМЈМЈ пҫҗ)пҫү',
      '/бҗ бө•М©М©МҘ вҖёбө•М©М©МҘ бҗҹпҫү','[^._.^]пҫүеҪЎ','/бҗ  - Л• -гғһ віҠ','аё… МіН’вҖўЛ‘М«вҖў МіН’аё…вҷЎ',
      '=^._.^= вҲ«','(пҫҗвҖўМҖбҶҪвҖўМҖпҫҗ)','^ Мі. М« . Мі^','вүҪЬ«вүј',
      'кҗ‘ХһвҖўп»ҢвҖўХһкҗ‘','(вӮҢ бө•МЈМЈМЈМЈМЈ бҶҪ бө•МЈМЈМЈМЈМЈвӮҢ)','(=рҹқҰ п»Ң рҹқҰ=)','а¬І(в“ӣ Пү в“ӣ)а¬І',
      '(пҫҗ бө•МЈМЈМЈМЈМЈМЈ п»Ң бө•МЈМЈМЈМЈМЈМЈ пҫҗ)','(пҫҗа°ҹбҶҪа°ҹпҫҗ)','вӮҚЛ„В·НҲајқВ·НҲЛ„вӮҺв—һ','а·ҶвӮҚЛ„В·НҲајқВ·НҲЛ„вӮҺаё…Л’',
      '(аҘғЛ„В·НҲајқВ·НҲЛ„ аҘғ )','Л“аё…вӮҚбө”В·НҲајқВ·НҲбө”вӮҺаё…Л’',
    ];

    const CAT_COLORS = [
      '#e05c5c','#d4820a','#c4a800','#5aaa5a','#3a9fbf',
      '#9b6abf','#d45c8a','#4db8a0','#e07840','#7a9e3b',
    ];

    function seededIndex(id, length) {
      let h = id * 2654435761;
      h = h ^ (h >>> 16);
      return Math.abs(h) % length;
    }

    function getCatForPost(id) {
      return {
        text: CATS[seededIndex(id, CATS.length)],
        color: CAT_COLORS[seededIndex(id * 31 + 7, CAT_COLORS.length)],
      };
    }

    function toggleWrite() {
      const wrapper = document.getElementById('write-section');
      const btn = document.querySelector('.open-write-btn');
      wrapper.classList.toggle('open');
      btn.textContent = wrapper.classList.contains('open') ? 'вңҸпёҸ мһ‘м„ұ лӢ«кё°' : 'вңҸпёҸ л°©лӘ…лЎқ мһ‘м„ұн•ҳкё°';
      if (!wrapper.classList.contains('open')) document.getElementById('write-error').textContent = '';
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    async function loadPosts() {
      const statusEl = document.getElementById('status-msg');
      const listEl = document.getElementById('post-list');
      statusEl.textContent = 'л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...';
      listEl.innerHTML = '';

      try {
        const res = await fetch(BASE_URL);
        if (!res.ok) throw new Error();
        const posts = await res.json();
        statusEl.textContent = '';
        if (posts.length === 0) {
          listEl.innerHTML = '<p class="empty-msg">м•„м§Ғ мһ‘м„ұлҗң л°©лӘ…лЎқмқҙ м—ҶмҠөлӢҲлӢӨ. вүҪ^вҖўв©ҠвҖў^вүј</p>';
          return;
        }
        posts.forEach(post => listEl.appendChild(createPostElement(post)));
      } catch {
        statusEl.textContent = 'лӘ©лЎқмқ„ л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.';
      }
    }

    function createPostElement(post) {
      const wrapper = document.createElement('div');
      wrapper.className = 'post-wrapper';
      wrapper.id = 'post-' + post.id;

      const { text: catText, color: catColor } = getCatForPost(post.id);

      // к·Җ м•ҲмӘҪ мӮјк°Ғнҳ• (н…Ңл‘җлҰ¬ мғүкіј л°°кІҪмғүмңјлЎң мһ…мІҙк°җ)
      wrapper.innerHTML = `
        <div class="ear-left"></div>
        <div class="ear-right"></div>
        <div class="post-item">
          <span class="post-cat" style="color:${catColor};">${catText}</span>
          <span class="post-title">${escapeHtml(post.title)}</span>
          <div class="post-meta">${escapeHtml(post.writer)} В· ${formatDate(post.created_at)}</div>
          <div class="post-content">${escapeHtml(post.content)}</div>
          <div class="delete-area">
            <input type="password" id="pw-${post.id}" placeholder="л№„л°ҖлІҲнҳё" />
            <button class="delete-btn" onclick="deletePost(${post.id})">мӮӯм ң</button>
          </div>
          <div id="del-error-${post.id}" class="error-msg"></div>
        </div>
      `;
      return wrapper;
    }

    async function submitPost() {
      const title = document.getElementById('inp-title').value.trim();
      const writer = document.getElementById('inp-writer').value.trim();
      const content = document.getElementById('inp-content').value.trim();
      const password = document.getElementById('inp-password').value;
      const errorEl = document.getElementById('write-error');

      if (!title || !writer || !content || !password) {
        errorEl.textContent = 'лӘЁл“  н•ӯлӘ©мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.';
        return;
      }
      errorEl.textContent = '';

      try {
        const res = await fetch(BASE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, writer, content, password })
        });
        if (!res.ok) throw new Error();

        ['inp-title','inp-writer','inp-content','inp-password'].forEach(id => document.getElementById(id).value = '');

        const section = document.getElementById('write-section');
        section.classList.remove('open');
        document.querySelector('.open-write-btn').textContent = 'вңҸпёҸ л°©лӘ…лЎқ мһ‘м„ұн•ҳкё°';
        loadPosts();
      } catch {
        errorEl.textContent = 'мһ‘м„ұм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.';
      }
    }

    async function deletePost(id) {
      const pw = document.getElementById('pw-' + id).value;
      const errorEl = document.getElementById('del-error-' + id);

      if (!pw) { errorEl.textContent = 'л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.'; return; }
      errorEl.textContent = '';

      try {
        const res = await fetch(`${BASE_URL}${id}/`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });

        if (res.status === 403 || res.status === 401) { errorEl.textContent = 'л№„л°ҖлІҲнҳёк°Җ нӢҖл ёмҠөлӢҲлӢӨ.'; return; }
        if (!res.ok) throw new Error();

        const el = document.getElementById('post-' + id);
        if (el) el.remove();

        if (document.getElementById('post-list').children.length === 0) {
          document.getElementById('post-list').innerHTML = '<p class="empty-msg">м•„м§Ғ мһ‘м„ұлҗң л°©лӘ…лЎқмқҙ м—ҶмҠөлӢҲлӢӨ. вүҪ^вҖўв©ҠвҖў^вүј</p>';
        }
      } catch {
        errorEl.textContent = 'мӮӯм ңм—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.';
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPosts();
  </script>
</body>
</html>
